<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Beacon of Helios - Giriş</title>
  <link rel="stylesheet" href="../static/css/register.css">
</head>
<body class="login-page">

  <div class="solar-bg">
    <div class="solar-image"></div>
    <div class="solar-depth"></div>
    <div class="solar-heat"></div>
    <div class="solar-glow"></div>
    <div class="solar-overlay"></div>
  </div>

  <div class="login-container">
    <h1>Kayıt Ol</h1>
    <p>Olası risklerden haberdar olmak için kayıt olun.</p>
    
    <form class="login-form">
      <label for="name">İsim</label>
      <input type="text" id="name" placeholder="İsminizi girin">

      <label for="surname">Soyisim</label>
      <input type="text" id="surname" placeholder="Soy isminizi girin">

      <label for="email">E-posta</label>
      <input type="email" id="email" placeholder="e-posta adresinizi girin">

      <button id="register-btn" type="submit" class="btn-login">Kayıt Ol</button>
      <button id="index-btn" class="btn-main-menu">Ana Sayfa</button>
    </form>

    <div class="login-footer">
    </div>
  </div>


    <script src="../static/js/register.js"></script>
</body>
</html>
